name: Sync Upstream to Gitee

on:
  schedule:
    # 每天北京时间 10:00 执行 (UTC 时间 2:00)
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许在 Actions 页面手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出你自己的 Fork 仓库（作为获取文件的来源）
      - name: Checkout my forked repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 配置 Git 用户信息
      - name: Configure Git User
        run: |
          git config user.name "yangcosc"
          git config user.email "yzcaishui@gmail.com"

      # 3. 添加并拉取上游 (Upstream) 原始仓库的最新代码
      - name: Fetch from Upstream
        run: |
          git remote add upstream https://github.com/AdguardTeam/HostlistsRegistry.git
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories -X theirs

      # 4. 【核心】创建临时目录并复制指定文件
      - name: Prepare files for sync
        run: |
          # 创建一个干净的临时目录
          mkdir sync-dir
          
          # 👇 在这里添加你需要同步的固定文件路径 👇
          # cp <源文件路径> sync-dir/
          cp sources/base.json sync-dir/
          cp categories/adguard.txt sync-dir/
          # 你可以复制任意多个文件，只需增加 cp 命令即可
          # cp path/to/another/file.txt sync-dir/

      # 5. 将临时目录中的文件推送到 Gitee
      - name: Push to Gitee
        working-directory: ./sync-dir # 关键：指定工作目录为临时目录
        run: |
          # 初始化一个新的 git 仓库
          git init
          git config user.name "yzcaishui"
          git config user.email "372033692@qq.com"
          
          # 添加所有文件并提交
          git add .
          git commit -m "Sync: Auto update specific files from upstream"
          
          # 设置 SSH 密钥
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 禁用 SSH 主机密钥检查（在 CI 环境中常用）
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts
          
          # 添加 Gitee 远程地址并推送
          git remote add origin ${{ secrets.GITEE_REPO_URL }}
          git branch -M main
          git push -u --force origin main
